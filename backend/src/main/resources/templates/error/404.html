<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found (404) - Smart Old Age Home Portal</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="login-container">

    <div class="login-card text-center">
        <div class="login-header">
            <span class="fs-1 d-block mb-3">🔍</span>
            <h2>Page Not Found (404)</h2>
            <p>The page you are looking for does not exist or has been moved.</p>
        </div>
        <div class="alert alert-danger mb-4" role="alert">
            We couldn't find the requested path on our server. Please check the spelling of the URL or return to safety.
        </div>
        <a th:href="@{/dashboard}" class="btn btn-primary w-100">Back to Dashboard</a>
    </div>

</body>
</html>
