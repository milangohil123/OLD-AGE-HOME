<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error (500) - Smart Old Age Home Portal</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="login-container">

    <div class="login-card text-center">
        <div class="login-header">
            <span class="fs-1 d-block mb-3">⚠️</span>
            <h2>System Error (500)</h2>
            <p>Something went wrong on our end.</p>
        </div>
        <div class="alert alert-danger mb-4" role="alert">
            An unexpected error occurred processing your request. The server encountered an internal configuration issue.
        </div>
        <a th:href="@{/dashboard}" class="btn btn-primary w-100">Back to Dashboard</a>
    </div>

</body>
</html>
