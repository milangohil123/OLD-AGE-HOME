<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main(~{::#reports-donations}, 'reports', 'Donation Reports')}">
<body>

    <div id="reports-donations">

        <div class="card mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="mb-0 fw-bold">Donation Reports Configuration</h3>
                    <p class="text-muted mb-0">Apply filters below to generate custom donation reports.</p>
                </div>
                <a th:href="@{/reports}" class="btn btn-secondary px-3">Back to Reports</a>
            </div>
        </div>

        <div class="card">
            <h4 class="mb-4 text-primary fw-bold">Report Filters</h4>
            <form th:action="@{/reports/preview}" method="get">
                <input type="hidden" name="type" value="donations">

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Payment Method</label>
                        <select class="form-select" name="paymentMethod">
                            <option value="ALL">All Methods</option>
                            <option value="CASH">Cash</option>
                            <option value="UPI">UPI</option>
                            <option value="CHEQUE">Cheque</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Donation Type</label>
                        <select class="form-select" name="donationType">
                            <option value="ALL">All Types</option>
                            <option th:each="dt : ${donationTypes}" th:value="${dt}" th:text="${dt.displayName}"></option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3 mb-4">
                        <label class="form-label">Month</label>
                        <select class="form-select" name="month">
                            <option value="">-- Select Month --</option>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>

                    <div class="col-md-3 mb-4">
                        <label class="form-label">Year</label>
                        <input type="number" name="year" class="form-control" placeholder="e.g. 2026" min="2000" max="2100">
                    </div>

                    <div class="col-md-3 mb-4">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="startDate" class="form-control">
                    </div>

                    <div class="col-md-3 mb-4">
                        <label class="form-label">End Date</label>
                        <input type="date" name="endDate" class="form-control">
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-4 border-top pt-3">
                    <button type="submit" class="btn btn-primary px-4" style="height:48px;">
                        🔍 Preview Report
                    </button>
                </div>
            </form>
        </div>

    </div>

</body>
</html>
