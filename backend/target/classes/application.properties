# Server configuration
server.port=8080
server.servlet.session.timeout=25m

# MySQL Database connection configuration
# Adjust the username and password below to match your local MySQL configuration.
spring.datasource.url=jdbc:mysql://localhost:3306/smart_old_age_home?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
# Alternative fallback config (if root has no password, uncomment below and comment the line above)
# spring.datasource.password=

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf configuration (disabled caching for development hot swapping)
spring.thymeleaf.cache=false

# File upload properties
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
