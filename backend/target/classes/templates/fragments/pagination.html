<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <!--
        Smart Old Age Home — Reusable Pagination Fragment
        Usage:
            <div th:replace="~{fragments/pagination :: pagination(page=${yourPage}, baseUrl='/your-path', queryParams=${paginationQuery})}"></div>

        Parameters:
            - page       : org.springframework.data.domain.Page<?>  (required)
            - baseUrl    : String — base URL without query params     (required)
            - queryParams : String — preserved query string           (optional)
    -->
        <div th:fragment="pagination(page, baseUrl, queryParams)"
            th:if="${page != null and (page.totalElements > 0 or (page.content != null and !page.content.isEmpty()))}"
         class="pagination-shell d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">

        <div class="pagination-meta d-flex align-items-center gap-3 flex-wrap">
            <div class="pagination-size-group d-flex align-items-center gap-2">
                <span class="pagination-label">Rows per page</span>
                <select class="form-select form-select-sm pagination-size-select"
                        th:onchange="|changePaginationSize(this.value, '${baseUrl}', '${queryParams}')|">
                    <option value="10" th:selected="${page.size == 10}">10</option>
                    <option value="25" th:selected="${page.size == 25}">25</option>
                    <option value="50" th:selected="${page.size == 50}">50</option>
                    <option value="100" th:selected="${page.size == 100}">100</option>
                </select>
            </div>

            <span class="pagination-divider d-none d-sm-inline">|</span>

            <div class="pagination-summary">
                Showing
                <strong th:text="${page.totalElements == 0 ? 0 : page.number * page.size + 1}">1</strong>
                –
                <strong th:text="${T(java.lang.Math).min((page.number + 1) * page.size, page.totalElements)}">10</strong>
                of
                <strong th:text="${page.totalElements}">100</strong>
            </div>
        </div>

        <nav th:if="${page.totalPages > 1}" aria-label="Pagination navigation" class="pagination-nav">
            <ul class="pagination pagination-rail mb-0">
                <li class="page-item pagination-item pagination-prev" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link pagination-link pagination-prev-link"
                       th:href="${page.first} ? '#' : |${baseUrl}?page=${page.number - 1}&size=${page.size}${queryParams != null and !queryParams.isBlank() ? '&' + queryParams : ''}|"
                       th:attr="tabindex=${page.first ? '-1' : '0'}"
                       aria-label="Previous page">
                        <span>Back</span>
                    </a>
                </li>

                <li class="page-item pagination-item" th:classappend="${page.number == 0} ? 'active'">
                    <a class="page-link pagination-link pagination-number-link"
                      th:href="|${baseUrl}?page=0&size=${page.size}${queryParams != null and !queryParams.isBlank() ? '&' + queryParams : ''}|">1</a>
                </li>

                <li class="page-item pagination-item pagination-ellipsis disabled" th:if="${page.number > 3}">
                    <span class="page-link pagination-link pagination-ellipsis-link">...</span>
                </li>

                <th:block th:if="${page.totalPages > 2}" th:each="i : ${#numbers.sequence(1, page.totalPages - 2)}">
                    <li class="page-item pagination-item"
                        th:if="${i >= page.number - 1 and i <= page.number + 1}"
                        th:classappend="${page.number == i} ? 'active'">
                        <a class="page-link pagination-link pagination-number-link"
                                    th:href="|${baseUrl}?page=${i}&size=${page.size}${queryParams != null and !queryParams.isBlank() ? '&' + queryParams : ''}|"
                           th:text="${i + 1}">2</a>
                    </li>
                </th:block>

                <li class="page-item pagination-item pagination-ellipsis disabled" th:if="${page.number < page.totalPages - 4}">
                    <span class="page-link pagination-link pagination-ellipsis-link">...</span>
                </li>

                <li class="page-item pagination-item" th:classappend="${page.number == page.totalPages - 1} ? 'active'">
                    <a class="page-link pagination-link pagination-number-link"
                       th:href="|${baseUrl}?page=${page.totalPages - 1}&size=${page.size}${queryParams != null and !queryParams.isBlank() ? '&' + queryParams : ''}|"
                       th:text="${page.totalPages}">12</a>
                </li>

                <li class="page-item pagination-item pagination-next" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link pagination-link pagination-next-link"
                       th:href="${page.last} ? '#' : |${baseUrl}?page=${page.number + 1}&size=${page.size}${queryParams != null and !queryParams.isBlank() ? '&' + queryParams : ''}|"
                       th:attr="tabindex=${page.last ? '-1' : '0'}"
                       aria-label="Next page">
                        <span>Next</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div th:if="${page.totalPages <= 1}" class="pagination-single-note">
            All entries shown
        </div>

    </div>

    <script th:inline="javascript">
        if (typeof changePaginationSize === 'undefined') {
            function changePaginationSize(size, baseUrl, queryParams) {
                var url = baseUrl + '?page=0&size=' + size;
                if (queryParams && queryParams.trim() !== '') {
                    url += '&' + queryParams;
                }
                window.location.href = url;
            }
        }
    </script>

</body>
</html>
