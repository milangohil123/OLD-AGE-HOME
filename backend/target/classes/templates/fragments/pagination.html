<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="pagination(page, baseUrl, queryParams)">
    
    <!-- Show pagination only if content exists -->
    <div th:if="${page != null and page.totalElements > 0}">
        
        <div class="d-flex justify-content-between align-items-center my-4 flex-wrap gap-3">
            
            <!-- Left Section: Summary and Rows Per Page -->
            <div class="d-flex align-items-center gap-4 flex-wrap">
                
                <!-- Summary Text -->
                <small class="text-muted">
                    <span th:if="${page.totalElements > 0}">
                        Showing
                        <strong th:text="${page.number * page.size + 1}"></strong>
                        to
                        <strong th:text="${(page.number + 1) * page.size > page.totalElements ? page.totalElements : (page.number + 1) * page.size}"></strong>
                        of
                        <strong th:text="${page.totalElements}"></strong>
                    </span>
                </small>
                
                <!-- Rows Per Page Selector -->
                <form method="get" th:action="${baseUrl}" class="d-flex align-items-center gap-2">
                    <label for="pageSize" class="form-label mb-0 small fw-semibold">Per Page:</label>
                    <select id="pageSize" name="size" class="form-select form-select-sm" style="width: auto;" onchange="this.form.submit()">
                        <option value="10" th:selected="${page.size == 10}">10</option>
                        <option value="25" th:selected="${page.size == 25}">25</option>
                        <option value="50" th:selected="${page.size == 50}">50</option>
                        <option value="100" th:selected="${page.size == 100}">100</option>
                    </select>
                    <!-- Preserve current search/sort parameters -->
                    <input type="hidden" name="page" value="0">
                    <input type="hidden" name="keyword" th:if="${param.keyword != null}" th:value="${param.keyword}">
                    <input type="hidden" name="sort" th:if="${param.sort != null}" th:value="${param.sort}">
                    <input type="hidden" name="direction" th:if="${param.direction != null}" th:value="${param.direction}">
                </form>
            </div>
            
            <!-- Right Section: Pagination Controls -->
            <nav th:if="${page.totalPages > 1}" aria-label="Pagination Navigation">
                <ul class="pagination mb-0 gap-1">
                    
                    <!-- Previous Button -->
                    <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                        <a th:if="${!page.first}" 
                           class="page-link"
                           th:href="@{${baseUrl}(page=${page.number - 1}, size=${page.size}, keyword=${param.keyword}, sort=${param.sort}, direction=${param.direction})}"
                           href="#">← Previous</a>
                        <span th:if="${page.first}" class="page-link">← Previous</span>
                    </li>
                    
                    <!-- Page Number Links -->
                    <th:block th:each="pageNum : ${#numbers.sequence(0, page.totalPages - 1)}">
                        <!-- Show first 2, last 2, and range around current page -->
                        <th:block th:if="${pageNum < 2 or pageNum >= page.totalPages - 2 or (pageNum >= page.number - 1 and pageNum <= page.number + 1)}">
                            <li class="page-item" th:classappend="${pageNum == page.number} ? 'active'">
                                <a th:if="${pageNum != page.number}"
                                   class="page-link"
                                   th:href="@{${baseUrl}(page=${pageNum}, size=${page.size}, keyword=${param.keyword}, sort=${param.sort}, direction=${param.direction})}"
                                   th:text="${pageNum + 1}"
                                   href="#">1</a>
                                <span th:if="${pageNum == page.number}" class="page-link" th:text="${pageNum + 1}">1</span>
                            </li>
                        </th:block>
                        
                        <!-- Ellipsis indicator -->
                        <th:block th:if="${pageNum == 2 and page.totalPages > 5 and page.number > 3}">
                            <li class="page-item disabled">
                                <span class="page-link">…</span>
                            </li>
                        </th:block>
                    </th:block>
                    
                    <!-- Next Button -->
                    <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                        <a th:if="${!page.last}"
                           class="page-link"
                           th:href="@{${baseUrl}(page=${page.number + 1}, size=${page.size}, keyword=${param.keyword}, sort=${param.sort}, direction=${param.direction})}"
                           href="#">Next →</a>
                        <span th:if="${page.last}" class="page-link">Next →</span>
                    </li>
                    
                </ul>
            </nav>
        </div>
        
    </div>
</div>

</body>
</html>
