<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: main(~{::#resident-form-container}, 'residents', ${resident.id == null ? 'Register New Resident' : 'Edit Resident Profile'})}">
<body>

    <div id="resident-form-container">
        
        <!-- Action Header -->
        <div class="card mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="mb-0 fw-bold" th:text="${resident.id == null ? 'Register New Resident' : 'Edit Resident Profile'}">Register Resident</h3>
                    <p class="text-muted mb-0">Fill in the fields below. Required values are marked with an asterisk (*).</p>
                </div>
                <a th:href="@{/residents}" class="btn btn-secondary px-3">
                    Back to List
                </a>
            </div>
        </div>

        <!-- Form Shell -->
        <form th:action="${resident.id == null ? '/residents/save' : '/residents/update'}" 
              th:object="${resident}" method="post" enctype="multipart/form-data">
            
            <!-- Hidden id field for updates -->
            <input type="hidden" th:if="*{id != null}" th:field="*{id}">
            <input type="hidden" th:if="*{photo != null}" th:field="*{photo}">

            <div class="row">
                <!-- Left Column (Core Details) -->
                <div class="col-lg-8 col-md-12">
                    
                    <!-- Section A: Personal Information -->
                    <div class="card mb-4">
                        <h4 class="mb-4 border-bottom pb-2 text-primary fw-bold">Personal Information</h4>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('residentId', 'Resident ID Code', true)}"></label>
                                <input type="text" class="form-control" th:field="*{residentId}" 
                                       th:classappend="${#fields.hasErrors('residentId')} ? 'is-invalid' : ''"
                                       placeholder="e.g. SAH-2026-0001" required>
                                <div th:replace="~{fragments/forms :: field-error('residentId')}"></div>
                            </div>
                            
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('fullName', 'Full Name', true)}"></label>
                                <input type="text" class="form-control" th:field="*{fullName}" 
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                       placeholder="e.g. Jane Smith" required>
                                <div th:replace="~{fragments/forms :: field-error('fullName')}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('gender', 'Gender', true)}"></label>
                                <select class="form-select" th:field="*{gender}" 
                                        th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid' : ''" required>
                                    <option value="">-- Select Gender --</option>
                                    <option value="MALE">Male</option>
                                    <option value="FEMALE">Female</option>
                                    <option value="OTHER">Other</option>
                                </select>
                                <div th:replace="~{fragments/forms :: field-error('gender')}"></div>
                            </div>
                            
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('dateOfBirth', 'Date of Birth', true)}"></label>
                                <input type="date" class="form-control" th:field="*{dateOfBirth}" 
                                       th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid' : ''" required>
                                <div th:replace="~{fragments/forms :: field-error('dateOfBirth')}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('bloodGroup', 'Blood Group', false)}"></label>
                                <select class="form-select" th:field="*{bloodGroup}">
                                    <option value="">-- Select Blood Group --</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('joiningDate', 'Admission / Joining Date', true)}"></label>
                                <input type="date" class="form-control" th:field="*{joiningDate}" 
                                       th:classappend="${#fields.hasErrors('joiningDate')} ? 'is-invalid' : ''" required>
                                <div th:replace="~{fragments/forms :: field-error('joiningDate')}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('status', 'Resident Status', true)}"></label>
                                <select class="form-select" th:field="*{status}" required>
                                    <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}"></option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('mobile', 'Mobile Number', false)}"></label>
                                <input type="text" class="form-control" th:field="*{mobile}" 
                                       th:classappend="${#fields.hasErrors('mobile')} ? 'is-invalid' : ''"
                                       placeholder="e.g. 9876543210">
                                <div th:replace="~{fragments/forms :: field-error('mobile')}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12 mb-4">
                                <label th:replace="~{fragments/forms :: label('email', 'Email Address (Optional)', false)}"></label>
                                <input type="email" class="form-control" th:field="*{email}" 
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                       placeholder="e.g. resident@example.com">
                                <div th:replace="~{fragments/forms :: field-error('email')}"></div>
                            </div>
                        </div>

                        <div class="mb-0">
                            <label th:replace="~{fragments/forms :: label('address', 'Permanent Address', false)}"></label>
                            <textarea class="form-control" th:field="*{address}" rows="3" placeholder="Enter home address..."></textarea>
                        </div>
                    </div>

                    <!-- Section B: Guardian & Emergency Contact -->
                    <div class="card mb-4">
                        <h4 class="mb-4 border-bottom pb-2 text-primary fw-bold">Guardian Details</h4>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('guardianName', 'Guardian Full Name', false)}"></label>
                                <input type="text" class="form-control" th:field="*{guardianName}" placeholder="e.g. Robert Smith">
                            </div>
                            
                            <div class="col-md-6 mb-4">
                                <label th:replace="~{fragments/forms :: label('guardianPhone', 'Guardian Phone Number', false)}"></label>
                                <input type="text" class="form-control" th:field="*{guardianPhone}" 
                                       th:classappend="${#fields.hasErrors('guardianPhone')} ? 'is-invalid' : ''"
                                       placeholder="e.g. 9876543211">
                                <div th:replace="~{fragments/forms :: field-error('guardianPhone')}"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Section C: Medical Parameters -->
                    <div class="card mb-4">
                        <h4 class="mb-4 border-bottom pb-2 text-primary fw-bold">Medical Logs & Details</h4>
                        <div class="mb-0">
                            <label th:replace="~{fragments/forms :: label('medicalNotes', 'Medical Notes / Prescription Info', false)}"></label>
                            <textarea class="form-control" th:field="*{medicalNotes}" rows="4" 
                                      placeholder="List allergies, chronic illness, daily medicine schedules..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Right Column (Photo Upload & Submit Actions) -->
                <div class="col-lg-4 col-md-12">
                    
                    <!-- Profile Photo Card -->
                    <div class="card mb-4 text-center">
                        <h4 class="mb-4 border-bottom pb-2 text-primary fw-bold">Profile Image</h4>
                        
                        <div class="mb-3 d-flex justify-content-center">
                            <!-- Display Photo Preview or Default Icon -->
                            <img th:if="*{photo != null}" th:src="@{'/uploads/' + *{photo}}" 
                                 class="rounded-circle object-fit-cover border" style="width: 140px; height: 140px;">
                            <div th:if="*{photo == null}" class="rounded-circle bg-light d-flex align-items-center justify-content-center border" 
                                 style="width: 140px; height: 140px; font-size: 56px;">
                                👴
                            </div>
                        </div>
                        
                        <div class="mb-0 text-start">
                            <label for="photoFile" class="form-label">Upload New Photo</label>
                            <input class="form-control" type="file" id="photoFile" name="photoFile" accept="image/*" style="height: auto;">
                            <small class="text-muted mt-2 d-block">Supported file types: PNG, JPG, JPEG (Max 5MB)</small>
                        </div>
                    </div>

                    <!-- Submit Actions Card -->
                    <div class="card">
                        <h4 class="mb-4 border-bottom pb-2 text-primary fw-bold">Actions</h4>
                        <button type="submit" class="btn btn-primary w-100 mb-3" style="height: 48px;">
                            Save Record
                        </button>
                        <a th:href="@{/residents}" class="btn btn-secondary w-100" style="height: 48px;">
                            Cancel
                        </a>
                    </div>
                </div>
            </div>
            
        </form>

    </div>

</body>
</html>
